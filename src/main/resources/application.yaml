spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:postgresql://localhost:5432/url_shortener
    username: url_shortener
    password: url_shortener
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        # Sem requeue automático: mensagem rejeitada vai para o DLX declarado na fila.
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 500ms
          multiplier: 2
          max-interval: 5s
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

app:
  base-url: http://localhost:8080
  jwt:
    expires-in: 1h
    # Default apenas para desenvolvimento. Em produção defina JWT_SECRET (mínimo 32 bytes para HS256).
    secret: ${JWT_SECRET:change-me-development-only-secret-key!!}
  short-code:
    # Default apenas para desenvolvimento. Em produção defina SQIDS_ALPHABET:
    # o alfabeto embaralhado é segredo — é o que impede enumerar os códigos sequenciais.
    alphabet: ${SQIDS_ALPHABET:QsYBMgUruEzjiotl3AHL1PIqChda42yWN8xKDSkR9mwVp0Gc6XZF57JTbOnfev}
