name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew check

      - name: Build Docker image
        run: docker build -t url-shortener .
